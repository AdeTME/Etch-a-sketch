<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
</head>
<body>

<div id="container"></div>

    <script>
        const container = document.querySelector("#container"); // get the container from the document
        const btn = document.createElement("button");
        const topdiv = document.createElement("div"); 
        btn.textContent = ("Change grid dimensions");//added text to the button that is beind displayed at the top
        topdiv.style.display="flex";
        topdiv.style.justifyContent="center";
        container.style.display = "flex"; // make the container into a flex
        container.style.flexDirection = "column";
        container.style.justifyContent="center";
        container.style.alignItems="center";


        let squareNumber = 16;// declared the number of squares, default is 16 per the exercise


    function pageLoad(squareNumber){
        for (let i = 0; i<squareNumber; i++){  //start a loop to to 16, to create individual divs at each of the lines

                const outdiv = document.createElement("div"); //create an outdiv constant that makes the div holders that will hold the divs for each of the 16 lines
                
                outdiv.style.display = "flex"; //make it a flexbox so that they can be side by side, default direction is row

                
            for (let i = 0; i<squareNumber; i++){ //start a new loop to make the horizontal 16 divs for each outdiv

            const indiv = document.createElement("div");  // create an indiv constant that makes the divs that the out div will hold
            indiv.style.border="1px solid black";
            indiv.style.width = "45px";
            indiv.style.height = "45px";

            outdiv.appendChild(indiv); // appened each indiv to the main outdiv of that line
            
            }
            container.appendChild(outdiv);//append each outdiv to the primary div container 
        }
        const cell = document.querySelectorAll("#container > div > div"); // important, querySelectorAll check every single div applicable, and the constraints use tree logic

        cell.forEach(cell => {
            cell.addEventListener("mouseenter", ()=>{
                cell.style.backgroundColor = "black";
            });
        });
    }

    pageLoad(squareNumber);

        btn.addEventListener("click", ()=> {            //listening for an event, click, that does a function when it occurs
            squareNumber = prompt("grid dimensions");   //puts the number inside the squareNumber value, which is still in the function
            if (squareNumber !== null) {                        //runs an if statement to make sure there is a value given t
            alert( squareNumber + " by " + squareNumber + " grid");
            container.replaceChildren();
            pageLoad(squareNumber);
        }});

        

        topdiv.appendChild(btn);
        document.body.insertBefore(topdiv,container);

    </script>
</body>
</html>
